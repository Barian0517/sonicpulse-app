name: "publish"

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's skip on linux and windows
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: install frontend dependencies
        run: npm install

      - name: auto-increment version
        shell: bash
        run: |
          # 取得目前的版本號
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          # 結合 GitHub Run Number 產生唯一版本號 (例如 0.1.0.12)
          # 注意：Tauri v2 的版本號格式建議符合 Semantic Versioning 或 x.y.z.w
          NEW_VERSION="${CURRENT_VERSION}.${{ github.run_number }}"
          echo "Building version: $NEW_VERSION"
          
          # 更新 tauri.conf.json 中的版本號
          sed -i "s/\"version\": \".*\"/\"version\": \"$NEW_VERSION\"/" src-tauri/tauri.conf.json
          # 更新 package.json (可選，但保持一致較好)
          sed -i "s/\"version\": \".*\"/\"version\": \"$NEW_VERSION\"/" package.json

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version
          releaseName: "SonicPulse Visualizer v__VERSION__"
          releaseBody: "See the assets below to download the latest version of SonicPulse Visualizer."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
