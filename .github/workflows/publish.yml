name: "publish"

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's skip on linux and windows
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: install frontend dependencies
        run: npm install

      - name: build frontend assets
        run: npm run build

      - name: download node sidecar
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          mkdir -p dist-jukebox
          
          if [ "${{ matrix.platform }}" == "windows-latest" ]; then
            curl -LO "https://nodejs.org/dist/v22.14.0/node-v22.14.0-win-x64.zip"
            unzip node-v22.14.0-win-x64.zip
            mv node-v22.14.0-win-x64/node.exe src-tauri/binaries/node-x86_64-pc-windows-msvc.exe
          elif [ "${{ matrix.platform }}" == "ubuntu-22.04" ]; then
            curl -LO "https://nodejs.org/dist/v22.14.0/node-v22.14.0-linux-x64.tar.xz"
            tar -xf node-v22.14.0-linux-x64.tar.xz
            mv node-v22.14.0-linux-x64/bin/node src-tauri/binaries/node-x86_64-unknown-linux-gnu
            chmod +x src-tauri/binaries/node-x86_64-unknown-linux-gnu
          elif [ "${{ matrix.platform }}" == "macos-latest" ]; then
            curl -LO "https://nodejs.org/dist/v22.14.0/node-v22.14.0-darwin-x64.tar.gz"
            tar -xf node-v22.14.0-darwin-x64.tar.gz
            mv node-v22.14.0-darwin-x64/bin/node src-tauri/binaries/node-x86_64-apple-darwin
            chmod +x src-tauri/binaries/node-x86_64-apple-darwin
            
            curl -LO "https://nodejs.org/dist/v22.14.0/node-v22.14.0-darwin-arm64.tar.gz"
            tar -xf node-v22.14.0-darwin-arm64.tar.gz
            mv node-v22.14.0-darwin-arm64/bin/node src-tauri/binaries/node-aarch64-apple-darwin
            chmod +x src-tauri/binaries/node-aarch64-apple-darwin
          fi

      - name: auto-increment version
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const tauri = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            const cargoToml = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
            const [major, minor] = pkg.version.split('.');
            const patch = Math.max(0, parseInt(process.env.GITHUB_RUN_NUMBER) - 20);
            const newVersion = major + '.' + minor + '.' + patch;
            console.log('Updating version to: ' + newVersion);
            pkg.version = newVersion;
            tauri.version = newVersion;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(tauri, null, 2));
            fs.writeFileSync('src-tauri/Cargo.toml', cargoToml.replace(/^version = \".*\"/m, 'version = \"' + newVersion + '\"'));
          "
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version
          releaseName: "SonicPulse Visualizer v__VERSION__"
          releaseBody: "See the assets below to download the latest version of SonicPulse Visualizer."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
